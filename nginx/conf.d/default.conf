# =====================================================

# 1. HTTP → HTTPS Redirect

# ===========================================
server {
    listen 80;
    server_name lucacare.co.ke www.lucacare.co.ke;

    # 1. Handle Certbot FIRST
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 2. Redirect everything else to Kykam
    location / {
        return 301 https://kykamagencies.co.ke$request_uri;
    }
}
# 3. HTTPS Redirect for the old domain (Lucacare)
server {
    listen 443 ssl;
    http2 on;
    server_name lucacare.co.ke www.lucacare.co.ke;

    # Use the same certificate paths as Kykam
    # (Assuming you expand the cert to cover both)
    ssl_certificate /etc/letsencrypt/live/kykamagencies.co.ke/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kykamagencies.co.ke/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Redirect all HTTPS lucacare traffic to HTTPS kykam
    return 301 https://kykamagencies.co.ke$request_uri;
}
server {

    listen 80;

    server_name kykamagencies.co.ke www.kykamagencies.co.ke;



    location /.well-known/acme-challenge/ {

        root /var/www/certbot;

    }



    location / {

        return 301 https://$host$request_uri;

    }

}



# =====================================================

# 2. HTTPS - Main Site

# =====================================================

server {

    listen 443 ssl;
    http2 on;
    server_name kykamagencies.co.ke www.kykamagencies.co.ke;



    client_max_body_size 20M;



    # SSL

    ssl_certificate /etc/letsencrypt/live/kykamagencies.co.ke/fullchain.pem;

    ssl_certificate_key /etc/letsencrypt/live/kykamagencies.co.ke/privkey.pem;

    include /etc/letsencrypt/options-ssl-nginx.conf;

    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;



    # =================================================

    # DJANGO ADMIN (MUST COME FIRST)

    # =================================================

    location /root/admin/ {

    proxy_pass http://backend:8000;

    proxy_set_header Host $host;

    proxy_set_header X-Real-IP $remote_addr;

    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_redirect off;

    }





    # =================================================

    # DJANGO API

    # =================================================

    location /api/ {

        proxy_pass http://backend:8000;

        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header X-Forwarded-Proto https;

    }



    # =================================================

    # DJANGO STATIC FILES

    # =================================================

    location /static/ {

        alias /app/staticfiles/;

    }



    location /media/ {

        alias /app/media/;

        # Stop the redirect to home if the file is actually missing

        try_files $uri =404;

        autoindex off;

    }



    # =================================================

    # REACT FRONTEND (LAST!)

    # =================================================

   location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri /index.html;
}

}